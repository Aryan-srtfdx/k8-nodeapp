# .github/workflows/main.yaml

name: CI/CD Pipeline

# TRIGGER — run this pipeline when you push to main branch
on:
  push:
    branches:
      - main

# JOBS — what to actually do
jobs:
  build-and-deploy:
    # Run on GitHub's Ubuntu servers (free!)
    runs-on: ubuntu-latest

    steps:
      # Step 1 — Download your code onto GitHub's server
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2 — Install Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # Step 3 — Install dependencies
      - name: Install dependencies
        run: npm install

      # Step 4 — Run tests (pipeline stops here if tests fail)
      - name: Run tests
        run: npm test

      # Step 5 — Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 6 — Build Docker image
      - name: Build Docker image
        run: docker build -t yourdockerhubname/nodeapp:latest .

      # Step 7 — Push to Docker Hub
      - name: Push to Docker Hub
        run: docker push yourdockerhubname/nodeapp:latest